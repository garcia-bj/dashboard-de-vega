# ============================================================
#  De Vega — Compose #3: Frontend (Next.js)
#  Dokploy: crea una tercera "Application" tipo "Compose" con este archivo
# ============================================================

services:
  frontend:
    build:
      context: ./frontend
      args:
        # Se hornea en el bundle de JS. El navegador del usuario debe alcanzar esta URL.
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    env_file:
      - .env
    container_name: devega-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    networks:
      - devega

networks:
  devega:
    name: devega
    external: true
