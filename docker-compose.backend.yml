# ============================================================
#  De Vega — Compose #2: Backend (FastAPI + n8n)
#  Dokploy: crea una segunda "Application" tipo "Compose" con este archivo
#  El .env es el mismo para los 3 stacks (copiado de .env.prod)
# ============================================================

services:
  backend:
    build: ./backend
    container_name: devega-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env.backend
    volumes:
      - uploads:/app/uploads
    networks:
      - devega
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  n8n:
    image: docker.n8n.io/n8nio/n8n
    container_name: devega-n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - N8N_HOST=localhost
      - N8N_RUNNERS_ENABLED=true
      - N8N_EDITOR_BASE_URL=${N8N_EDITOR_BASE_URL}
      - WEBHOOK_URL=${N8N_WEBHOOK_URL_PUBLIC}
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=${POSTGRES_N8N_DB}
      - DB_POSTGRESDB_USER=${POSTGRES_USER}
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - n8n_data:/home/node/.n8n
      - ./n8n/workflows:/home/node/workflows
    networks:
      - devega
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  uploads:
  n8n_data:

networks:
  devega:
    name: devega
    external: true
