# ============================================================
#  De Vega — Compose #2: Backend (FastAPI + n8n)
#  Dokploy: crea una segunda "Application" tipo "Compose" con este archivo
#  El .env es el mismo para los 3 stacks (copiado de .env.prod)
# ============================================================

services:
  backend:
    build: ./backend
    container_name: devega-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - uploads:/app/uploads
    networks:
      - devega
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  uploads:

networks:
  devega:
    name: devega
    external: true
