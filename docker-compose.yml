services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: de_vega
      POSTGRES_PASSWORD: de_vega_secret
      POSTGRES_DB: de_vega
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U de_vega"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  rustfs:
    image: rustfs/rustfs:latest
    ports:
      - "9000:9000"   # S3 API  →  http://localhost:9000
      - "9001:9001"   # Web console
    environment:
      - RUSTFS_ACCESS_KEY_ID=de_vega
      - RUSTFS_SECRET_ACCESS_KEY=de_vega_secret
    volumes:
      - rustfs_data:/data

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file: ./backend/.env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - STORAGE_BACKEND=s3
      - STORAGE_S3_ENDPOINT=http://rustfs:9000
      - STORAGE_S3_PUBLIC_URL=http://localhost:9000
      - STORAGE_S3_BUCKET=de-vega-media
      - STORAGE_S3_ACCESS_KEY=de_vega
      - STORAGE_S3_SECRET_KEY=de_vega_secret
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rustfs:
        condition: service_started

  n8n:
    image: docker.n8n.io/n8nio/n8n
    ports:
      - "5678:5678"
    environment:
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - N8N_HOST=localhost
      - N8N_RUNNERS_ENABLED=true
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=n8n
      - DB_POSTGRESDB_USER=de_vega
      - DB_POSTGRESDB_PASSWORD=de_vega_secret
    volumes:
      - n8n_data:/home/node/.n8n
      - ./n8n/workflows:/home/node/workflows
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
    depends_on:
      - backend

volumes:
  pgdata:
  rustfs_data:
  n8n_data:
